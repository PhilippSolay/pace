server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ESM and worker MIME — nginx 1.27 mime.types doesn't include `.mjs`,
  # which causes browsers to reject pdfjs's module worker. The default
  # types are inherited; this block adds the few JS-flavoured extensions
  # we serve. (Module workers refuse anything other than a JS MIME.)
  types {
    application/javascript js mjs;
    text/css css;
    image/svg+xml svg;
    image/png png;
    image/jpeg jpg jpeg;
    image/x-icon ico;
    application/manifest+json webmanifest;
    application/json json;
    font/woff2 woff2;
    font/woff woff;
    text/html html htm;
    text/plain txt;
  }
  default_type application/octet-stream;

  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml font/woff2;

  # Long cache for hashed assets
  location /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # No cache for index.html, sw.js, manifest (PWA update path)
  location = /index.html        { add_header Cache-Control "no-cache, no-store, must-revalidate"; expires 0; }
  location = /sw.js             { add_header Cache-Control "no-cache"; expires 0; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; expires 0; }

  # Web Share Target POST — client-side SW handles this, but nginx must
  # allow the method + fall through to index.html for the SPA router.
  location = /share {
    # Let SW intercept POST /share; GET /share falls through to SPA.
    try_files /index.html =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Don't log favicon misses
  location = /favicon.ico { access_log off; log_not_found off; }
}
