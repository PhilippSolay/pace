services:
  pace:
    build:
      context: .
      dockerfile: Dockerfile
    image: pace:latest
    container_name: pace
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.pace.rule=Host(`pace.solay.cloud`)"
      - "traefik.http.routers.pace.entrypoints=websecure"
      - "traefik.http.routers.pace.tls=true"
      - "traefik.http.routers.pace.tls.certresolver=mytlschallenge"
      - "traefik.http.services.pace.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
    name: n8n_default
